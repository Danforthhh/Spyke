<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f0f23"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#6c63ff" stroke-width="1.5"/>
  <!-- Cross arms — gaps where the ring is -->
  <line x1="16" y1="3"    x2="16" y2="9.5"  stroke="#6c63ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="22.5" x2="16" y2="29"   stroke="#6c63ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3"  y1="16"   x2="9.5" y2="16"  stroke="#6c63ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22.5" y1="16" x2="29" y2="16"   stroke="#6c63ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#6c63ff"/>
</svg>
